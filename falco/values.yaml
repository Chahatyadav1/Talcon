# Falco Helm values with minimal, high-fidelity MITRE rules
# No false positives — only real threats trigger quarantine

driver:
  kind: modern_ebpf

metrics:
  enabled: true
  outputRule: true

falcosidekick:
  enabled: true
  config:
    webhook:
      address: "http://security-ir-controller.security.svc.cluster.local:8080/webhook"
      minimumpriority: "critical"

# ═══════════════════════════════════════════════════════════════════════════════
# MITRE ATT&CK Detection Rules — False-positive-free
# Only high-confidence detections
# ═══════════════════════════════════════════════════════════════════════════════
customRules:
  mitre-rules.yaml: |-

    # ── Lists ────────────────────────────────────────────────────────────────
    
    - list: shell_binaries
      items: [bash, sh, dash, zsh, fish, ksh, csh, tcsh]
    
    - list: sensitive_files
      items: [/etc/shadow, /etc/gshadow, /etc/master.passwd, /etc/sudoers]
    
    - list: network_tools
      items: [wget, curl, nc, ncat, netcat, socat]
    
    - list: recon_tools
      items: [nmap, masscan, zmap, arp-scan, netdiscover, nbtscan]
    
    - list: container_runtimes
      items: [runc, containerd-shim, dockerd, containerd, crio]
    
    - list: system_ns
      items: [kube-system, kube-public, kube-node-lease, kube-apiserver, 
              monitoring, falco, security, cilium-spire, litmus, argocd]
    
    # ── Macros ───────────────────────────────────────────────────────────────
    
    - macro: in_app_container
      condition: >
        container
        and container.id != host
        and k8s.ns.name != "<NA>"
        and not k8s.ns.name in (system_ns)
    
    - macro: spawned_process
      condition: evt.type = execve
    
    - macro: interactive_shell
      condition: >
        spawned_process
        and proc.name in (shell_binaries)
        and not proc.pname in (container_runtimes, systemd, sshd, init, kubelet)
    
    # ─────────────────────────────────────────────────────────────────────────
    # T1059.004 — Execution: Interactive Shell in Container
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1059.004 Shell Spawned in Container
      desc: >
        Interactive shell spawned inside an application container.
        Excludes normal container runtime initialization.
      condition: >
        interactive_shell
        and in_app_container
        and not proc.pname in (bash, sh)
      output: >
        Shell spawned in container
        (MITRE:T1059.004 tactic:Execution
        user=%user.name shell=%proc.name parent=%proc.pname
        cmdline=%proc.cmdline
        pod=%k8s.pod.name ns=%k8s.ns.name
        image=%container.image.repository)
      priority: CRITICAL
      tags: [mitre_execution, T1059.004, container]

    # ─────────────────────────────────────────────────────────────────────────
    # T1003.008 — Credential Access: Sensitive File Read
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1003.008 Sensitive File Read in Container
      desc: >
        /etc/shadow, /etc/passwd, or /etc/sudoers read inside a running container.
        Container runtimes are excluded — they read these on pod initialization.
      condition: >
        evt.type in (open, openat, openat2)
        and evt.direction = <
        and in_app_container
        and fd.name in (sensitive_files)
        and not proc.name in (container_runtimes, useradd, usermod, id, getent)
        and not proc.pname in (container_runtimes)
      output: >
        Sensitive file read in container
        (MITRE:T1003.008 tactic:Credential_Access
        user=%user.name file=%fd.name
        proc=%proc.name cmdline=%proc.cmdline
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [mitre_credential_access, T1003.008, container]

    # ─────────────────────────────────────────────────────────────────────────
    # T1611 — Privilege Escalation: Container Escape (ptrace)
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1611 Ptrace Syscall in Container
      desc: >
        ptrace() syscall from inside an application container.
        Used for process inspection, debugging, or escape attempts.
      condition: >
        evt.type = ptrace
        and in_app_container
      output: >
        ptrace in container
        (MITRE:T1611 tactic:Privilege_Escalation
        user=%user.name proc=%proc.name pid=%proc.pid
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [mitre_privilege_escalation, T1611, container]

    # ─────────────────────────────────────────────────────────────────────────
    # T1611 — Privilege Escalation: Sensitive Mount
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1611 Mount Syscall in Container
      desc: >
        mount() syscall from inside an application container.
        Could indicate escape attempt or namespace manipulation.
      condition: >
        evt.type = mount
        and in_app_container
      output: >
        mount syscall in container
        (MITRE:T1611 tactic:Privilege_Escalation
        user=%user.name proc=%proc.name cmdline=%proc.cmdline
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [mitre_privilege_escalation, T1611, container]

    # ─────────────────────────────────────────────────────────────────────────
    # T1036 — Defense Evasion: Binary from Temp
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1036 Binary Executed from Tmp
      desc: >
        Binary or script executed from /tmp or /var/tmp.
        Indicates dropped payload or obfuscation.
      condition: >
        spawned_process
        and in_app_container
        and (proc.exe startswith /tmp/ or proc.exe startswith /var/tmp/)
      output: >
        Binary executed from tmp
        (MITRE:T1036 tactic:Defense_Evasion
        user=%user.name exe=%proc.exe cmdline=%proc.cmdline
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [mitre_defense_evasion, T1036, container]

    # ─────────────────────────────────────────────────────────────────────────
    # T1036 — Defense Evasion: Base64 Decode + Exec
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1036 Base64 Decode Piped to Execution
      desc: >
        base64 -d piped to bash/sh — typical obfuscated payload pattern.
      condition: >
        spawned_process
        and in_app_container
        and proc.cmdline contains "base64"
        and (proc.cmdline contains " -d" or proc.cmdline contains "--decode")
        and (proc.cmdline contains "|" or proc.cmdline contains "bash" or proc.cmdline contains "sh")
      output: >
        Base64 decode to shell execution
        (MITRE:T1036 tactic:Defense_Evasion
        user=%user.name cmdline=%proc.cmdline
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [mitre_defense_evasion, T1036, container]

    # ─────────────────────────────────────────────────────────────────────────
    # T1071 — Command and Control: Unexpected Outbound
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1071 Unexpected Outbound from Container
      desc: >
        Outbound connection from application container to external IP.
        Excludes DNS (port 53), loopback, and system namespaces.
      condition: >
        evt.type in (connect, sendto)
        and in_app_container
        and fd.rport != 53
        and fd.rport != 443
        and fd.rport != 80
        and not fd.rip in ("::", "::1", "127.0.0.1", "0.0.0.0")
        and not fd.rip startswith "10."
        and not fd.rip startswith "172.16."
        and not fd.rip startswith "192.168."
      output: >
        Unexpected outbound connection
        (MITRE:T1071 tactic:Command_and_Control
        user=%user.name proc=%proc.name
        dst=%fd.rip:%fd.rport
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [mitre_command_and_control, T1071, container]

    # ─────────────────────────────────────────────────────────────────────────
    # T1105 — Command and Control: Download Tool
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1105 Download Tool Executed in Container
      desc: >
        wget, curl, or netcat used to download files inside a running container.
        Excludes package manager operations.
      condition: >
        spawned_process
        and in_app_container
        and proc.name in (wget, curl)
        and not proc.pname in (apt, apt-get, yum, dnf, apk, pip, npm)
      output: >
        Download tool in container
        (MITRE:T1105 tactic:Command_and_Control
        user=%user.name proc=%proc.name cmdline=%proc.cmdline
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [mitre_command_and_control, T1105, container]

    # ─────────────────────────────────────────────────────────────────────────
    # T1095 — Command and Control: Reverse Shell
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1095 Reverse Shell Pattern Detected
      desc: >
        netcat or socat with -e (exec) flag — classic reverse shell.
      condition: >
        spawned_process
        and in_app_container
        and proc.name in (nc, ncat, netcat, socat)
        and (proc.cmdline contains " -e " or proc.cmdline contains "exec")
      output: >
        Reverse shell pattern detected
        (MITRE:T1095 tactic:Command_and_Control
        user=%user.name proc=%proc.name cmdline=%proc.cmdline
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [mitre_command_and_control, T1095, container]

    # ─────────────────────────────────────────────────────────────────────────
    # T1046 — Discovery: Network Scanning
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1046 Network Scanning Tool Executed
      desc: >
        nmap, masscan, or other network reconnaissance tool in container.
      condition: >
        spawned_process
        and in_app_container
        and proc.name in (recon_tools)
      output: >
        Network scanning tool executed
        (MITRE:T1046 tactic:Discovery
        user=%user.name proc=%proc.name cmdline=%proc.cmdline
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [mitre_discovery, T1046, container]

    # ─────────────────────────────────────────────────────────────────────────
    # T1552.007 — Credential Access: SA Token Read
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1552.007 ServiceAccount Token Read
      desc: >
        Service account token file read by unexpected process.
      condition: >
        evt.type in (open, openat, openat2)
        and evt.direction = <
        and in_app_container
        and fd.name startswith /var/run/secrets/kubernetes.io/serviceaccount
        and not proc.name in (container_runtimes, pause)
      output: >
        ServiceAccount token read
        (MITRE:T1552.007 tactic:Credential_Access
        user=%user.name proc=%proc.name file=%fd.name
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: WARNING
      tags: [mitre_credential_access, T1552.007, container]

    # ─────────────────────────────────────────────────────────────────────────
    # T1082 — Discovery: System Info Enumeration
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1082 System Info Enumeration from Shell
      desc: >
        id, whoami, uname, hostname commands from shell in container.
        Indicates post-compromise enumeration.
      condition: >
        spawned_process
        and in_app_container
        and proc.name in (id, whoami, uname, hostname, uptime)
        and proc.pname in (shell_binaries)
      output: >
        System information enumeration
        (MITRE:T1082 tactic:Discovery
        user=%user.name proc=%proc.name
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: WARNING
      tags: [mitre_discovery, T1082, container]

    # ─────────────────────────────────────────────────────────────────────────
    # T1552.001 — Credential Access: Hardcoded Secrets
    # ─────────────────────────────────────────────────────────────────────────
    - rule: T1552.001 Grep for Secrets Pattern
      desc: >
        grep searching for credentials (password, secret, key, token, api_key).
        Indicates credential hunting.
      condition: >
        spawned_process
        and in_app_container
        and proc.name = grep
        and (proc.cmdline contains "password" or proc.cmdline contains "secret" 
             or proc.cmdline contains "api_key" or proc.cmdline contains "token")
      output: >
        Credential pattern search
        (MITRE:T1552.001 tactic:Credential_Access
        user=%user.name cmdline=%proc.cmdline
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: WARNING
      tags: [mitre_credential_access, T1552.001, container]