snippets:
    extraScrapeConfigs: |
      - job_name: tetragon
        static_configs:
          - targets: [localhost]
            labels:
              job: tetragon
              __path__: /var/log/tetragon/tetragon.log
        pipeline_stages:
          - json:
              expressions:
                exec_binary:     "process_exec.process.binary"
                exec_namespace:  "process_exec.process.pod.namespace"
                exec_pod:        "process_exec.process.pod.name"
                kprobe_binary:   "process_kprobe.process.binary"
                kprobe_namespace: "process_kprobe.process.pod.namespace"
                kprobe_pod:      "process_kprobe.process.pod.name"
                kprobe_function: "process_kprobe.function_name"
                kprobe_action:   "process_kprobe.action"
                kprobe_policy:   "process_kprobe.policy_name"
                exit_binary:     "process_exit.process.binary"
                exit_namespace:  "process_exit.process.pod.namespace"
                node_name:       "node_name"
                event_time:      "time"
          - template:
              source: event_type
              template: >-
                {{"{{"}}- if .exec_binary -{{"}}"}}process_exec
                {{"{{"}}- else if .kprobe_function -{{"}}"}}process_kprobe
                {{"{{"}}- else if .exit_binary -{{"}}"}}process_exit
                {{"{{"}}- else -{{"}}"}}unknown{{"{{"}}- end -{{"}}"}}
          - template:
              source: pod_namespace
              template: >-
                {{"{{"}}- if .exec_namespace -{{"}}"}}{{"{{"}} .exec_namespace {{"}}"}}
                {{"{{"}}- else if .kprobe_namespace -{{"}}"}}{{"{{"}} .kprobe_namespace {{"}}"}}
                {{"{{"}}- else if .exit_namespace -{{"}}"}}{{"{{"}} .exit_namespace {{"}}"}}
                {{"{{"}}- else -{{"}}"}}unknown{{"{{"}}- end -{{"}}"}}
          - template:
              source: enforcement
              template: >-
                {{"{{"}}- if eq .kprobe_action "KPROBE_ACTION_SIGKILL" -{{"}}"}}blocked_kill
                {{"{{"}}- else if eq .kprobe_action "KPROBE_ACTION_OVERRIDE" -{{"}}"}}blocked_override
                {{"{{"}}- else -{{"}}"}}observed{{"{{"}}- end -{{"}}"}}
          - labels:
              event_type: event_type
              pod_namespace: pod_namespace
              kprobe_action: kprobe_action
              enforcement: enforcement
              node_name: node_name
          - timestamp:
              source: event_time
              format: RFC3339Nano
              fallback_formats:
                - RFC3339