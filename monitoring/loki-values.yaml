deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  # Required in Loki v3.x — defines how logs are indexed and stored.
  # tsdb is the modern index store (replaces boltdb-shipper).
  # v13 is the latest schema version as of 2025.
  schemaConfig:
    configs:
      - from: "2024-01-01" # any past date — schema applies from this date onward
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: filesystem

  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    retention_period: 168h # 7 days

  compactor:
    retention_enabled: true
    working_directory: /var/loki/compactor

  server:
    log_level: warn

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi

# Disable distributed components — not needed for SingleBinary
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  enabled: false
