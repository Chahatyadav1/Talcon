# upgrade-4-chaos/pod-delete.yaml
# Kills demo-app pods every 10 seconds for 60 seconds
# Verify: Tetragon still enforces, Cilium still drops, Falco still alerts
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-delete-chaos
  namespace: demo-app
spec:
  appinfo:
    appns:    demo-app
    applabel: "app=demo-app"
    appkind:  deployment
  chaosServiceAccount: litmus-admin
  monitoring: true
  jobCleanUpPolicy: delete
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            - name: CHAOS_INTERVAL
              value: "10"
            - name: FORCE
              value: "false"
            - name: PODS_AFFECTED_PERC
              value: "50"