apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: observe-exec
spec:
  podSelector:
    matchExpressions:
      - key: "k8s:io.kubernetes.pod.namespace"
        operator: NotIn
        values:
          - "security"
          - "falco"
          - "kube-system"
          - "monitoring"
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Postfix"
              values:
                - "/bash"
                - "/sh"
                - "/dash"
                - "/python"
                - "/python3"