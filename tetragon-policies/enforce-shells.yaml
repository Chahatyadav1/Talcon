# tetragon-policies/enforce-shells.yaml
# KILLS any bash/sh/dash process the moment it is exec'd
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: enforce-shells
spec:
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Postfix"
              values:
                - "/bash"
                - "/sh"
                - "/dash"
          matchActions:
            - action: Sigkill    # kernel sends SIGKILL to the process before it runs