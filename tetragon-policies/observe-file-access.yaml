# tetragon-policies/observe-file-access.yaml
# Logs any time a process tries to open /etc/shadow, /etc/passwd, or /etc/gshadow
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: observe-file-access
spec:
  kprobes:
    - call: "security_file_open"
      syscall: false
      args:
        - index: 0
          type: "file"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Postfix"
              values:
                - "etc/shadow"
                - "etc/gshadow"
                - "etc/passwd"