apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: observe-file-access
spec:
  podSelector:
    matchExpressions:
      - key: "k8s:io.kubernetes.pod.namespace"
        operator: NotIn
        values:
          - "falco"
          - "security"
          - "kube-system"
          - "monitoring"
  kprobes:
    - call: "security_file_open"
      syscall: false
      args:
        - index: 0
          type: "file"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Postfix"
              values:
                - "etc/shadow"
                - "etc/gshadow"
                - "etc/passwd"